<div class="field{% if field.errors %} has-err{% endif %}">
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    <div class="inp">
        {% if icon == 'mail' %}
        <svg class="pre" width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2.5" stroke="currentColor" stroke-width="2"/>
            <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        {% elif icon == 'lock' %}
        <svg class="pre" width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="4" y="10" width="16" height="11" rx="2.5" stroke="currentColor" stroke-width="2"/>
            <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="2"/>
        </svg>
        {% elif icon == 'shield' %}
        <svg class="pre" width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 3l7 3v5c0 4.5-2.8 8.5-7 10-4.2-1.5-7-5.5-7-10V6l7-3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M9 12l2 2 4-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        {% else %}
        <svg class="pre" width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M4 21c1.6-4 4.2-6 8-6s6.4 2 8 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        {% endif %}
        {{ field }}
        {% if password_toggle %}
        <button type="button" class="toggle" aria-label="Tampilkan sandi" data-password-toggle>
            <svg class="eye-open" width="19" height="19" viewBox="0 0 24 24" fill="none" data-eye-open aria-hidden="true">
                <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            </svg>
            <svg class="eye-off" width="19" height="19" viewBox="0 0 24 24" fill="none" data-eye-off aria-hidden="true">
                <path d="M3 3l18 18M10.6 10.7a3 3 0 0 0 4 4M9.4 5.2A10 10 0 0 1 12 5c6 0 10 7 10 7a18 18 0 0 1-3.2 3.8M6.2 6.3A18 18 0 0 0 2 12s4 7 10 7a10 10 0 0 0 2.3-.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        {% endif %}
    </div>
    {% if field.help_text %}<div class="hint">{{ field.help_text }}</div>{% endif %}
    {% for error in field.errors %}<div class="err">{{ error }}</div>{% endfor %}
</div>
